<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13">
  <defs>
    <linearGradient id="keepGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="evictGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="stubGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1d5db"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <linearGradient id="windowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="shadow" x="-2" y="-2" width="8" height="8">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="340" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">SCS Sliding Window (N=3)</text>
  <text x="400" y="46" text-anchor="middle" font-size="11" fill="#64748b">Skill-Context-Slide — LRU eviction during context compression</text>

  <!-- ===== ROW 1: BEFORE ===== -->
  <text x="30" y="78" font-size="11" font-weight="bold" fill="#475569">Before</text>
  <text x="30" y="92" font-size="9" fill="#94a3b8">(6 skills loaded)</text>

  <rect x="110" y="68" width="88" height="34" rx="5" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="154" y="90" text-anchor="middle" fill="#0369a1" font-weight="bold" font-size="12">skill_A</text>

  <rect x="206" y="68" width="88" height="34" rx="5" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="250" y="90" text-anchor="middle" fill="#0369a1" font-weight="bold" font-size="12">skill_B</text>

  <rect x="302" y="68" width="88" height="34" rx="5" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="346" y="90" text-anchor="middle" fill="#0369a1" font-weight="bold" font-size="12">skill_C</text>

  <rect x="398" y="68" width="88" height="34" rx="5" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="442" y="90" text-anchor="middle" fill="#0369a1" font-weight="bold" font-size="12">skill_D</text>

  <rect x="494" y="68" width="88" height="34" rx="5" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="538" y="90" text-anchor="middle" fill="#0369a1" font-weight="bold" font-size="12">skill_E</text>

  <rect x="590" y="68" width="88" height="34" rx="5" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="634" y="90" text-anchor="middle" fill="#0369a1" font-weight="bold" font-size="12">skill_F</text>

  <!-- Arrow -->
  <line x1="100" y1="124" x2="690" y2="124" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="124" x2="400" y2="150" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== ROW 2: COMPRESSION ===== -->
  <text x="30" y="170" font-size="11" font-weight="bold" fill="#475569">Compression</text>
  <text x="30" y="184" font-size="9" fill="#94a3b8">(LRU window applied)</text>

  <!-- Window bracket -->
  <rect x="110" y="148" width="280" height="44" rx="8" fill="url(#windowGrad)" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="158" y="162" text-anchor="middle" font-size="10" fill="#6366f1" font-weight="bold">WINDOW (N=3)</text>
  <text x="158" y="174" text-anchor="middle" font-size="9" fill="#818cf8">← keep recent 3 →</text>

  <rect x="118" y="186" width="82" height="34" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="159" y="208" text-anchor="middle" fill="#166534" font-weight="bold" font-size="12">skill_C</text>
  <text x="159" y="220" text-anchor="middle" font-size="8" fill="#4ade80">recent hit ✓</text>

  <rect x="208" y="186" width="82" height="34" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="249" y="208" text-anchor="middle" fill="#166534" font-weight="bold" font-size="12">skill_D</text>
  <text x="249" y="220" text-anchor="middle" font-size="8" fill="#4ade80">recent hit ✓</text>

  <rect x="298" y="186" width="82" height="34" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="339" y="208" text-anchor="middle" fill="#166534" font-weight="bold" font-size="12">skill_E</text>
  <text x="339" y="220" text-anchor="middle" font-size="8" fill="#4ade80">recent hit ✓</text>

  <rect x="404" y="186" width="82" height="34" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="445" y="208" text-anchor="middle" fill="#991b1b" font-weight="bold" font-size="12">skill_A</text>
  <text x="445" y="220" text-anchor="middle" font-size="8" fill="#f87171">out of window ✗</text>

  <rect x="494" y="186" width="82" height="34" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="535" y="208" text-anchor="middle" fill="#991b1b" font-weight="bold" font-size="12">skill_B</text>
  <text x="535" y="220" text-anchor="middle" font-size="8" fill="#f87171">out of window ✗</text>

  <rect x="584" y="186" width="82" height="34" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="625" y="208" text-anchor="middle" fill="#991b1b" font-weight="bold" font-size="12">skill_F</text>
  <text x="625" y="220" text-anchor="middle" font-size="8" fill="#f87171">out of window ✗</text>

  <!-- Arrow 2 -->
  <line x1="100" y1="248" x2="690" y2="248" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="248" x2="400" y2="272" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== ROW 3: AFTER ===== -->
  <text x="30" y="288" font-size="11" font-weight="bold" fill="#475569">After</text>
  <text x="30" y="302" font-size="9" fill="#94a3b8">(stale skills stubbed)</text>

  <rect x="110" y="278" width="88" height="34" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="154" y="300" text-anchor="middle" fill="#166534" font-weight="bold" font-size="12">skill_C</text>

  <rect x="206" y="278" width="88" height="34" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="250" y="300" text-anchor="middle" fill="#166534" font-weight="bold" font-size="12">skill_D</text>

  <rect x="302" y="278" width="88" height="34" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="346" y="300" text-anchor="middle" fill="#166534" font-weight="bold" font-size="12">skill_E</text>

  <!-- Stubs -->
  <rect x="414" y="278" width="80" height="34" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="454" y="299" text-anchor="middle" fill="#94a3b8" font-size="9" font-style="italic">[stub]</text>
  <text x="454" y="310" text-anchor="middle" fill="#cbd5e1" font-size="7">reload on demand</text>

  <rect x="502" y="278" width="80" height="34" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="542" y="299" text-anchor="middle" fill="#94a3b8" font-size="9" font-style="italic">[stub]</text>
  <text x="542" y="310" text-anchor="middle" fill="#cbd5e1" font-size="7">reload on demand</text>

  <rect x="590" y="278" width="80" height="34" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="630" y="299" text-anchor="middle" fill="#94a3b8" font-size="9" font-style="italic">[stub]</text>
  <text x="630" y="310" text-anchor="middle" fill="#cbd5e1" font-size="7">reload on demand</text>

  <!-- Legend -->
  <g transform="translate(30, 324)">
    <rect x="0" y="0" width="10" height="10" rx="2" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
    <text x="14" y="9" font-size="9" fill="#64748b">kept</text>
    <rect x="55" y="0" width="10" height="10" rx="2" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
    <text x="69" y="9" font-size="9" fill="#64748b">evicted</text>
    <rect x="125" y="0" width="10" height="10" rx="2" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="139" y="9" font-size="9" fill="#64748b">stub (placeholder)</text>
  </g>
</svg>
